<div class="resource-grid">

  @for(item of resources; track item.title){

  <div class="resource-card">

    <div
      class="icon-box"
      [style.background]="item.color">

      <i class="{{item.icon}}"></i>

    </div>

    <h2>
      {{item.title}}
    </h2>
<!-- 
    <p>
      {{item.description}}
    </p> -->

   @if(item.count){

<div class="resource-count">
  {{item.count}}
</div>

}

    <!-- @if(item.route){

      <a
        [routerLink]="item.route"
        class="resource-btn">

        View Databases

      </a>

    } -->

  </div>

  }

</div>
