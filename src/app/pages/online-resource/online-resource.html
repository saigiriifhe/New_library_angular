<div class="resource-page">

  <div class="page-header">

    <h1>Online Resources</h1>

    <p>
      Explore Digital Learning and Research Resources
    </p>

  </div>

  <div class="resource-grid">

    @for(item of resources; track item.title){

    <div class="resource-card">

      <div
        class="icon-box"
        [style.background]="item.color">

        <i class="{{item.icon}}"></i>

      </div>

      <h2>
        {{item.title}}
      </h2>

      <p>
        {{item.description}}
      </p>

      @if(item.route){

      <a
        [routerLink]="item.route"
        class="resource-btn">

        Open Resource

      </a>

      } @else {

      <button class="resource-btn">

        Coming Soon

      </button>

      }

    </div>

    }

  </div>

</div>
