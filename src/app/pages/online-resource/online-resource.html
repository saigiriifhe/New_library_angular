
<div class="resource-page">

  <button
    class="back-btn"
    routerLink="/">

    <i class="bi bi-arrow-left"></i>

    Back

  </button>

  <div class="resource-grid">

    @for(item of resources; track item.title){

    <div class="resource-card">

      <div
        class="icon-box"
        [style.background]="item.color">

        <i class="{{item.icon}}"></i>

      </div>

      <h2>
        {{item.title}}
      </h2>

      @if(item.count){

      <div class="resource-count">
        {{item.count}}
      </div>

      }

    </div>

    }

  </div>

</div>
