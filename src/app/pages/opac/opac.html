<div class="opac-page">

  <div class="page-header">

    <h1>Library OPAC</h1>

    <p>
      Online Public Access Catalogue
    </p>

  </div>

  <div class="opac-grid">

    <div class="opac-card">

      <div class="icon-box quick">

        <i class="bi bi-search"></i>

      </div>

      <h2>Quick Search</h2>

      <p>
        Search books, journals, reports and other resources
        using title, author or keyword.
      </p>

      <button
        class="quick-btn"
        (click)="openQuickSearch()">

        Open Quick Search

      </button>

    </div>

    <div class="opac-card">

      <div class="icon-box advanced">

        <i class="bi bi-funnel-fill"></i>

      </div>

      <h2>Advanced Search</h2>

      <p>
        Perform detailed searches using multiple filters
        and advanced criteria.
      </p>

      <button
        class="advanced-btn"
        (click)="openAdvancedSearch()">

        Open Advanced Search

      </button>

    </div>

  </div>

</div>
