<div class="database-page">

  <div class="page-title">

    <h1>Online Databases</h1>

    <p>
      Access premium academic, research and business databases
    </p>

  </div>

  <div class="database-grid">

    @for(db of databases; track db.title){

    <a
      [href]="db.link"
      target="_blank"
      class="database-card">

      <div
        class="icon"
        [style.background]="db.color">

        <i class="{{db.icon}}"></i>

      </div>

      <h3>{{db.title}}</h3>

      <span>
        Open Database
      </span>

    </a>

    }

  </div>

</div>
