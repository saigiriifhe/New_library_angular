<div class="periodicals-page">

  <app-back-button></app-back-button>

  <div class="page-header">

    <h1>Subscribed Periodicals</h1>

    <!-- <p>
      N J Yasaswy Memorial Library
    </p> -->

  </div>

  <div class="periodicals-grid">

    @for(item of periodicals; track item.title){

      <a
        [href]="item.file"
        target="_blank"
        class="periodical-card">

        <div class="icon-box">

          <i class=" {{item.icon}}"></i>

        </div>

        <h2>
          {{item.title}}
        </h2>

        <span class="view-btn">

          <i class="bi bi-file-earmark-pdf-fill pdf-icon"></i>

          Open PDF

        </span>

      </a>

    }

  </div>

</div>
