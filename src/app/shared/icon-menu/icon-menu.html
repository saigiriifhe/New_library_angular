<div class="icon-menu-container">

  @for(menu of menus; track menu.title){

    <div
      class="menu-card"
      (click)="openMenu(menu)">

      <div
        class="icon-circle"
        [style.background]="menu.color">

        <i class="{{menu.icon}}"></i>

      </div>

      <span>
        {{menu.title}}
      </span>

    </div>

  }

</div>
